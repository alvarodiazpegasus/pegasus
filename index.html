:root {

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'Barlow', sans-serif; background: var(--negro); color: var(--blanco); min-height: 100vh; overflow-x: hidden; }

.grad-text { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

.hero-banner { height: 260px; position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 40px 48px; }
.hero-bg { position: absolute; inset: 0; background: var(--grad-diag); opacity: 0.12; }

.hero-content { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; width: 100%; }
.hero-eyebrow { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
.hero-title { font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 700; font-style: italic; line-height: 1.05; }

main { padding: 8px 0 80px; max-width: 1400px; margin: 0 auto; }

.fila { padding: 24px 0; }

.fila-lock { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 10px; border-radius: 100px; cursor: pointer; transition: background 0.2s; border: none; font-family: 'Barlow', sans-serif; }
.lock-cerrado { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.45); }
.lock-cerrado:hover { background: rgba(255,255,255,0.14); }
.lock-abierto { background: rgba(8,183,91,0.15); color: var(--verde); cursor: default; }

.carrusel-wrapper { position: relative; }
.carrusel { display: flex; gap: 12px; padding: 8px 48px 16px; overflow-x: auto; scroll-behavior: smooth; scrollbar-width: none; -ms-overflow-style: none; }
.carrusel::-webkit-scrollbar { display: none; }

.fila-bloqueada .carrusel { filter: blur(6px); pointer-events: none; user-select: none; }
.fila-bloqueada.desbloqueada .carrusel { filter: none; pointer-events: all; }

.ncard-body { padding: 14px 16px; }
.ncard-nombre { font-size: 0.88rem; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
.ncard-desc { font-size: 0.75rem; color: rgba(255,255,255,0.45); line-height: 1.5; margin-bottom: 10px; }
